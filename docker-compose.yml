# =============================================================================
# vLLM + OpenCode + PaperClip Docker Compose
# GMKtec EVO-X2 | AMD Ryzen AI MAX+ 395 | 64GB RAM
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # vLLM - OpenAI 호환 LLM 추론 서버
  # ---------------------------------------------------------------------------
  vllm:
    build:
      context: .
      dockerfile: Dockerfile.vllm
    container_name: vllm-server
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ${MODEL_DIR:-./models}:/models:ro
    environment:
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-32}
      - VLLM_CPU_KVCACHE_SPACE=${VLLM_CPU_KVCACHE_SPACE:-40}
    command: >
      --host 0.0.0.0
      --port 8000
      --device cpu
      --model /models/${MODEL_FILENAME:-gemma-4-31B-it-Q4_K_M.gguf}
      --served-model-name ${SERVED_MODEL_NAME:-gemma-4-31b-it}
      --max-model-len ${MAX_MODEL_LEN:-8192}
      --kv-cache-dtype auto
      --dtype auto
      --tensor-parallel-size 1
      --disable-log-requests
    deploy:
      resources:
        limits:
          memory: ${VLLM_MEMORY_LIMIT:-48g}
    shm_size: '4g'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - llm-network

  # ---------------------------------------------------------------------------
  # OpenCode - AI 코딩 어시스턴트 웹 UI
  # ---------------------------------------------------------------------------
  opencode:
    image: smanx/opencode:latest
    container_name: opencode-web
    ports:
      - "${OPENCODE_PORT:-3000}:3000"
    environment:
      - OPENAI_API_BASE=http://vllm:8000/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-no-key-required}
      - LOCAL_ENDPOINT=http://vllm:8000/v1
    volumes:
      - ${WORKSPACE_DIR:-./workspace}:/workspace
    depends_on:
      vllm:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - llm-network

  # ---------------------------------------------------------------------------
  # PaperClip - AI 오케스트레이션 플랫폼
  # ---------------------------------------------------------------------------
  paperclip-db:
    image: postgres:17-alpine
    container_name: paperclip-postgres
    environment:
      POSTGRES_USER: ${PG_USER:-paperclip}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-paperclip}
      POSTGRES_DB: ${PG_DB:-paperclip}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-paperclip} -d ${PG_DB:-paperclip}"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - llm-network

  paperclip:
    image: ghcr.io/paperclipai/paperclip:latest
    container_name: paperclip-server
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      DATABASE_URL: postgres://${PG_USER:-paperclip}:${PG_PASSWORD:-paperclip}@paperclip-db:5432/${PG_DB:-paperclip}
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-change-this-secret-in-production}"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      paperclip-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - llm-network

volumes:
  pgdata:
  paperclip-data:

networks:
  llm-network:
    driver: bridge
