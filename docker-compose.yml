# =============================================================================
# LLM 추론 서버 + OpenCode Docker Compose
# GMKtec EVO-X2 | AMD Ryzen AI MAX+ 395 | 128GB LPDDR5
# Radeon 8060S (gfx1151, RDNA 4) — ROCm 7.2 + llama.cpp
# =============================================================================
# PaperClip은 npm 로컬 설치로 운영 (docker 외부)
# 참고: https://github.com/kyuz0/amd-strix-halo-toolboxes
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # LLM 서버 (레거시) — Gemma 4 31B Dense (ROCm GPU 가속)
  # 필요 시 `docker compose --profile legacy up -d llm`
  # ---------------------------------------------------------------------------
  llm:
    profiles: ["legacy"]
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2
    ## Qwen3.6 로딩 호환성이 필요할 때는 Dockerfile.llama-rocm 커스텀 빌드도 가능
    # build:
    #   context: .
    #   dockerfile: Dockerfile.llama-rocm
    container_name: llm-server
    ports:
      - "${LLM_PORT:-8000}:8000"
    volumes:
      - ${MODEL_DIR:-./models}:/models:ro
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    security_opt:
      - seccomp=unconfined
    environment:
      - GPU_MAX_HW_QUEUES=${GPU_MAX_HW_QUEUES:-2}
    command: >
      llama-server
      --host 0.0.0.0
      --port 8000
      -m /models/${MODEL_FILENAME:-gemma-4-31B-it-Q4_K_M.gguf}
      --alias ${SERVED_MODEL_NAME:-gemma-4-31b-it}
      -t ${OMP_NUM_THREADS:-32}
      -ngl 999
      -fa on
      --no-mmap
      -c ${CONTEXT_LENGTH:-65536}
      -np ${PARALLEL_SLOTS:-1}
      --cache-type-k q8_0
      --cache-type-v q8_0
    deploy:
      resources:
        limits:
          memory: ${LLM_MEMORY_LIMIT:-56g}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - llm-network

  # ---------------------------------------------------------------------------
  # LLM 서버 — Qwen3.6 35B-A3B (ROCm GPU 가속)
  # 긴 컨텍스트 / 기술 리서치 / PaperClip 핵심 에이전트용
  # 하이브리드 DeltaNet 모델의 안정성을 위해 1 슬롯 + prompt cache 비활성화
  # ---------------------------------------------------------------------------
  llm-qwen:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2
    container_name: llm-server-qwen
    ports:
      - "${QWEN_LLM_PORT:-8003}:8000"
    volumes:
      - ${MODEL_DIR:-./models}:/models:ro
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    security_opt:
      - seccomp=unconfined
    environment:
      - GPU_MAX_HW_QUEUES=${GPU_MAX_HW_QUEUES:-2}
    command: >
      llama-server
      --host 0.0.0.0
      --port 8000
      -m /models/${QWEN_MODEL_FILENAME:-Qwen3.6-35B-A3B-UD-Q4_K_M.gguf}
      --alias ${QWEN_SERVED_MODEL_NAME:-qwen3-6-35b-a3b}
      -t ${QWEN_OMP_NUM_THREADS:-32}
      -ngl 999
      -fa on
      --no-mmap
      -c ${QWEN_CONTEXT_LENGTH:-131072}
      -np ${QWEN_PARALLEL_SLOTS:-1}
      --cache-type-k q8_0
      --cache-type-v q8_0
      --cache-ram 0
    deploy:
      resources:
        limits:
          memory: ${QWEN_LLM_MEMORY_LIMIT:-64g}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s
    networks:
      - llm-network

  # ---------------------------------------------------------------------------
  # LLM 서버 (경량, 레거시) — llama-server (ROCm GPU 가속)
  # 필요 시 `docker compose --profile legacy up -d llm-fast`
  # ---------------------------------------------------------------------------
  llm-fast:
    profiles: ["legacy"]
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2
    container_name: llm-server-fast
    ports:
      - "${FAST_LLM_PORT:-8001}:8000"
    volumes:
      - ${MODEL_DIR:-./models}:/models:ro
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    security_opt:
      - seccomp=unconfined
    environment:
      - GPU_MAX_HW_QUEUES=${GPU_MAX_HW_QUEUES:-2}
    command: >
      llama-server
      --host 0.0.0.0
      --port 8000
      -m /models/${FAST_MODEL_FILENAME:-gemma-4-E4B-it-Q4_K_M.gguf}
      --alias ${FAST_SERVED_MODEL_NAME:-gemma-4-e4b-it}
      -t ${FAST_OMP_NUM_THREADS:-16}
      -ngl 999
      -fa on
      --no-mmap
      -c ${FAST_CONTEXT_LENGTH:-131072}
      -np ${FAST_PARALLEL_SLOTS:-4}
      --cache-type-k q8_0
      --cache-type-v q8_0
    deploy:
      resources:
        limits:
          memory: ${FAST_LLM_MEMORY_LIMIT:-16g}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - llm-network

  # ---------------------------------------------------------------------------
  # LLM 서버 — Gemma 4 26B-A4B (ROCm GPU 가속)
  # 기본 shorter/mid-context 작업용. 긴 문맥은 Qwen3.6 으로 분리
  # ---------------------------------------------------------------------------
  llm-moe:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2
    container_name: llm-server-moe
    ports:
      - "${MOE_LLM_PORT:-8002}:8000"
    volumes:
      - ${MODEL_DIR:-./models}:/models:ro
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    security_opt:
      - seccomp=unconfined
    environment:
      - GPU_MAX_HW_QUEUES=${GPU_MAX_HW_QUEUES:-2}
    command: >
      llama-server
      --host 0.0.0.0
      --port 8000
      -m /models/${MOE_MODEL_FILENAME:-google_gemma-4-26B-A4B-it-Q4_K_M.gguf}
      --alias ${MOE_SERVED_MODEL_NAME:-gemma-4-26b-a4b-it}
      -t ${MOE_OMP_NUM_THREADS:-32}
      -ngl 999
      -fa on
      --no-mmap
      -c ${MOE_CONTEXT_LENGTH:-65536}
      -np ${MOE_PARALLEL_SLOTS:-1}
      --cache-type-k q8_0
      --cache-type-v q8_0
    deploy:
      resources:
        limits:
          memory: ${MOE_LLM_MEMORY_LIMIT:-48g}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - llm-network

  # ---------------------------------------------------------------------------
  # OpenCode - AI 코딩 어시스턴트 웹 UI
  # ---------------------------------------------------------------------------
  opencode:
    image: smanx/opencode:latest
    container_name: opencode-web
    ports:
      - "${OPENCODE_PORT:-3000}:4096"
    environment:
      - OPENAI_API_BASE=http://llm-moe:8000/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-no-key-required}
      - LOCAL_ENDPOINT=http://llm-moe:8000/v1
    volumes:
      - ${WORKSPACE_DIR:-./workspace}:/workspace
      - ./opencode-config:/root/.config/opencode
    depends_on:
      llm-moe:
        condition: service_healthy
      llm-qwen:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge
