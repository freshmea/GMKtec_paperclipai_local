# =============================================================================
# LLM 추론 서버 + OpenCode + PaperClip Docker Compose
# GMKtec EVO-X2 | AMD Ryzen AI MAX+ 395 | 128GB LPDDR5
# Radeon 8060S (gfx1151, RDNA 4) — ROCm 7.2 + llama.cpp
# =============================================================================
# 참고: https://github.com/kyuz0/amd-strix-halo-toolboxes
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # LLM 서버 — llama-server (ROCm GPU 가속)
  # OpenAI 호환 API (/v1/chat/completions, /v1/models 등)
  # ---------------------------------------------------------------------------
  llm:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2
    ## 커스텀 빌드 시 아래 주석 해제 (image: 줄을 주석 처리):
    # build:
    #   context: .
    #   dockerfile: Dockerfile.llama-rocm
    container_name: llm-server
    ports:
      - "${LLM_PORT:-8000}:8000"
    volumes:
      - ${MODEL_DIR:-./models}:/models:ro
    # GPU 장치 접근
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    security_opt:
      - seccomp=unconfined
    environment:
      # ROCm 7.2는 gfx1151 네이티브 지원 — HSA_OVERRIDE 불필요
      - GPU_MAX_HW_QUEUES=${GPU_MAX_HW_QUEUES:-2}
    command: >
      llama-server
      --host 0.0.0.0
      --port 8000
      -m /models/${MODEL_FILENAME:-gemma-4-31B-it-Q4_K_M.gguf}
      --alias ${SERVED_MODEL_NAME:-gemma-4-31b-it}
      -ngl 999
      -fa
      --no-mmap
      -c ${CONTEXT_LENGTH:-8192}
    deploy:
      resources:
        limits:
          memory: ${LLM_MEMORY_LIMIT:-96g}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - llm-network

  # ---------------------------------------------------------------------------
  # OpenCode - AI 코딩 어시스턴트 웹 UI
  # ---------------------------------------------------------------------------
  opencode:
    image: smanx/opencode:latest
    container_name: opencode-web
    ports:
      - "${OPENCODE_PORT:-3000}:3000"
    environment:
      - OPENAI_API_BASE=http://llm:8000/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-no-key-required}
      - LOCAL_ENDPOINT=http://llm:8000/v1
    volumes:
      - ${WORKSPACE_DIR:-./workspace}:/workspace
    depends_on:
      llm:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - llm-network

  # ---------------------------------------------------------------------------
  # PaperClip - AI 오케스트레이션 플랫폼
  # ---------------------------------------------------------------------------
  paperclip-db:
    image: postgres:17-alpine
    container_name: paperclip-postgres
    environment:
      POSTGRES_USER: ${PG_USER:-paperclip}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-paperclip}
      POSTGRES_DB: ${PG_DB:-paperclip}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-paperclip} -d ${PG_DB:-paperclip}"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - llm-network

  paperclip:
    image: ghcr.io/paperclipai/paperclip:latest
    container_name: paperclip-server
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      DATABASE_URL: postgres://${PG_USER:-paperclip}:${PG_PASSWORD:-paperclip}@paperclip-db:5432/${PG_DB:-paperclip}
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-change-this-secret-in-production}"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      paperclip-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - llm-network

volumes:
  pgdata:
  paperclip-data:

networks:
  llm-network:
    driver: bridge
