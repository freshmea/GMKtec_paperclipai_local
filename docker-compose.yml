# =============================================================================
# LLM 추론 서버 + OpenCode Docker Compose
# GMKtec EVO-X2 | AMD Ryzen AI MAX+ 395 | 128GB LPDDR5
# Radeon 8060S (gfx1151, RDNA 4) — ROCm 7.2 + llama.cpp
# =============================================================================
# PaperClip은 npm 로컬 설치로 운영 (docker 외부)
# 참고: https://github.com/kyuz0/amd-strix-halo-toolboxes
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # LLM 서버 — llama-server (ROCm GPU 가속)
  # OpenAI 호환 API (/v1/chat/completions, /v1/models 등)
  # ---------------------------------------------------------------------------
  llm:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2
    ## 커스텀 빌드 시 아래 주석 해제 (image: 줄을 주석 처리):
    # build:
    #   context: .
    #   dockerfile: Dockerfile.llama-rocm
    container_name: llm-server
    ports:
      - "${LLM_PORT:-8000}:8000"
    volumes:
      - ${MODEL_DIR:-./models}:/models:ro
    # GPU 장치 접근
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    security_opt:
      - seccomp=unconfined
    environment:
      # ROCm 7.2는 gfx1151 네이티브 지원 — HSA_OVERRIDE 불필요
      - GPU_MAX_HW_QUEUES=${GPU_MAX_HW_QUEUES:-2}
    command: >
      llama-server
      --host 0.0.0.0
      --port 8000
      -m /models/${MODEL_FILENAME:-gemma-4-31B-it-Q4_K_M.gguf}
      --alias ${SERVED_MODEL_NAME:-gemma-4-31b-it}
      -t ${OMP_NUM_THREADS:-32}
      -ngl 999
      -fa on
      --no-mmap
      -c ${CONTEXT_LENGTH:-131072}
      -np ${PARALLEL_SLOTS:-2}
      --cache-type-k q8_0
      --cache-type-v q8_0
      --reasoning-format deepseek
    deploy:
      resources:
        limits:
          memory: ${LLM_MEMORY_LIMIT:-96g}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - llm-network

  # ---------------------------------------------------------------------------
  # LLM 서버 (경량) — llama-server (ROCm GPU 가속)
  # 빠른 응답용 Gemma 4 E4B (4.5B effective, 8B total)
  # ---------------------------------------------------------------------------
  llm-fast:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2
    container_name: llm-server-fast
    ports:
      - "${FAST_LLM_PORT:-8001}:8000"
    volumes:
      - ${MODEL_DIR:-./models}:/models:ro
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    security_opt:
      - seccomp=unconfined
    environment:
      - GPU_MAX_HW_QUEUES=${GPU_MAX_HW_QUEUES:-2}
    command: >
      llama-server
      --host 0.0.0.0
      --port 8000
      -m /models/${FAST_MODEL_FILENAME:-gemma-4-E4B-it-Q4_K_M.gguf}
      --alias ${FAST_SERVED_MODEL_NAME:-gemma-4-e4b-it}
      -t ${FAST_OMP_NUM_THREADS:-16}
      -ngl 999
      -fa on
      --no-mmap
      -c ${FAST_CONTEXT_LENGTH:-131072}
      -np ${FAST_PARALLEL_SLOTS:-4}
      --cache-type-k q8_0
      --cache-type-v q8_0
      --reasoning-format deepseek
    deploy:
      resources:
        limits:
          memory: ${FAST_LLM_MEMORY_LIMIT:-16g}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - llm-network

  # ---------------------------------------------------------------------------
  # LLM 서버 (MoE) — llama-server (ROCm GPU 가속)
  # Gemma 4 26B-A4B (25.2B total, 3.8B active, 128 experts)
  # MoE 구조로 빠른 속도 + 높은 품질 동시 달성
  # ---------------------------------------------------------------------------
  llm-moe:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2
    container_name: llm-server-moe
    ports:
      - "${MOE_LLM_PORT:-8002}:8000"
    volumes:
      - ${MODEL_DIR:-./models}:/models:ro
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    security_opt:
      - seccomp=unconfined
    environment:
      - GPU_MAX_HW_QUEUES=${GPU_MAX_HW_QUEUES:-2}
    command: >
      llama-server
      --host 0.0.0.0
      --port 8000
      -m /models/${MOE_MODEL_FILENAME:-google_gemma-4-26B-A4B-it-Q4_K_M.gguf}
      --alias ${MOE_SERVED_MODEL_NAME:-gemma-4-26b-a4b-it}
      -t ${MOE_OMP_NUM_THREADS:-32}
      -ngl 999
      -fa on
      --no-mmap
      -c ${MOE_CONTEXT_LENGTH:-131072}
      -np ${MOE_PARALLEL_SLOTS:-4}
      --cache-type-k q8_0
      --cache-type-v q8_0
      --reasoning-format deepseek
    deploy:
      resources:
        limits:
          memory: ${MOE_LLM_MEMORY_LIMIT:-48g}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - llm-network

  # ---------------------------------------------------------------------------
  # OpenCode - AI 코딩 어시스턴트 웹 UI
  # ---------------------------------------------------------------------------
  opencode:
    image: smanx/opencode:latest
    container_name: opencode-web
    ports:
      - "${OPENCODE_PORT:-3000}:4096"
    environment:
      - OPENAI_API_BASE=http://llm:8000/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-no-key-required}
      - LOCAL_ENDPOINT=http://llm:8000/v1
    volumes:
      - ${WORKSPACE_DIR:-./workspace}:/workspace
      - ./opencode-config:/root/.config/opencode
    depends_on:
      llm:
        condition: service_healthy
      llm-fast:
        condition: service_healthy
      llm-moe:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge
